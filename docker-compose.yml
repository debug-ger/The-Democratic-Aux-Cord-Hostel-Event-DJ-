version: '3.9'

services:
  # ── PostgreSQL Database ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: vibebox_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vibebox
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: vibebox_server
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/vibebox
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/server:/app
      - /app/node_modules

  # ── Next.js Frontend ─────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: vibebox_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_WS_URL: http://localhost:3001
    depends_on:
      - server

volumes:
  postgres_data:
